<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceFlow - Compare Prices Easily</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
        }
        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
        }
        .product img {
            width: 120px;
        }
        .product-info {
            flex: 1;
        }
        .btn {
            background: #ff9900;
            padding: 10px;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>PriceFlow</h1>
    <p>Compare prices from Amazon & Noon</p>
</header>

<div class="container">

    <div class="product">
        <img src="https://via.placeholder.com/120" alt="Product">
        <div class="product-info">
            <h3>Wireless Headphones</h3>
            <p>High quality sound with noise cancellation.</p>

            <p><strong>Amazon:</strong> $50</p>
            <a class="btn" href="YOUR_AMAZON_AFFILIATE_LINK" target="_blank">
                View on Amazon
            </a>

            <p><strong>Noon:</strong> $48</p>
            <a class="btn" href="#">
                View on Noon
            </a>
        </div>
    </div>

</div>

<footer>
    <p>
        Disclosure: As an Amazon Associate, we earn from qualifying purchases.
    </p>
</footer>

</body>
</html>
